<!DOCTYPE html>
<html>

<head>

  <title>HVAC Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #1f2937;
    }

    /*
      =====================
      SEARCH BAR
      =====================
    */

    .search-bar {
      margin-bottom: 20px;
    }

    .search-bar input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    /*
      =====================
      SUMMARY CARDS
      =====================
    */

    #summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .summary-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .summary-card h3 {
      margin: 0 0 10px 0;
      color: #374151;
    }

    .summary-card p {
      font-size: 28px;
      font-weight: bold;
      margin: 0;
      color: #111827;
    }

    /*
      =====================
      JOB GRID
      =====================
    */

    #jobs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .job-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .job-card h3 {
      margin-top: 0;
      color: #111827;
    }

    .job-card p {
      margin: 8px 0;
    }

    /*
      =====================
      STATUS BADGES
      =====================
    */

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }

    .scheduled {
      background: #2563eb;
    }

    .completed {
      background: #16a34a;
    }

    .invoiced {
      background: #ea580c;
    }

    .cancelled {
      background: #dc2626;
    }

    /*
      =====================
      CREATE JOB FORM
      =====================
    */

    .job-form {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .job-form input {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .job-form button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .job-form button:hover {
      background: #1d4ed8;
    }

    /*
      =====================
      DROPDOWNS + BUTTONS
      =====================
    */

    select,
    button {
      padding: 10px;
      border-radius: 8px;
      margin-top: 5px;
    }
@media (max-width: 768px) {

  body {
    padding: 12px;
  }

  h1 {
    font-size: 28px;
    text-align: center;
  }

  .job-form,
  .summary-card,
  .job-card {
    padding: 16px;
    border-radius: 10px;
  }

  #summary {
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  #jobs {
    grid-template-columns: 1fr;
    gap: 16px;
  }

  .summary-card p {
    font-size: 22px;
  }

  input,
  select,
  button {
    width: 100%;
    font-size: 16px;
    padding: 14px;
    box-sizing: border-box;
  }

  button {
    margin-top: 10px;
  }

  .status-badge {
    width: 100%;
    text-align: center;
    box-sizing: border-box;
  }

}
    .search-bar,
#statusFilter {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #f4f6f8;
  padding-top: 10px;
}
    .tech-name {
  font-weight: bold;
  color: #2563eb;
}
  </style>

</head>

<body>

  <h1>HVAC Dashboard</h1>

  <!-- CREATE JOB FORM -->

  <div class="job-form">

    <h2>Create Job</h2>

    <input
      type="text"
      id="customer"
      placeholder="Customer Name"
    >

    <input
      type="email"
      id="email"
      placeholder="Customer Email"
    >

    <input
      type="number"
      id="revenue"
      placeholder="Revenue"
    >

    <button onclick="createJob()">
      Create Job
    </button>

  </div>

  <!-- SEARCH -->

  <div class="search-bar">

    <input
      type="text"
      id="searchInput"
      placeholder="Search customers..."
      onkeyup="loadJobs()"
    >

  </div>

  <!-- STATUS FILTER -->

  <select
    id="statusFilter"
    onchange="loadJobs()"
  >

    <option value="All">
      All Statuses
    </option>

    <option value="Scheduled">
      Scheduled
    </option>

    <option value="Completed">
      Completed
    </option>

    <option value="Invoiced">
      Invoiced
    </option>

  </select>

  <br><br>
<select id="techFilter" onchange="loadJobs()">

  <option value="All">
    All Technicians
  </option>

  <option value="Jeremiah">
    Jeremiah
  </option>

  <option value="Mike">
    Mike
  </option>

  <option value="Chris">
    Chris
  </option>

</select>
  <!-- SUMMARY -->

  <div id="summary">

    <div class="summary-card">
      <h3>Total Revenue</h3>
      <p id="totalRevenue">$0</p>
    </div>

    <div class="summary-card">
      <h3>Total Jobs</h3>
      <p id="totalJobs">0</p>
    </div>

    <div class="summary-card">
      <h3>Completed</h3>
      <p id="completedJobs">0</p>
    </div>

    <div class="summary-card">
      <h3>Scheduled</h3>
      <p id="scheduledJobs">0</p>
    </div>

  </div>

  <!-- JOB CARDS -->

  <div id="jobs"></div>

  <script src="script.js"></script>

</body>

</html>
